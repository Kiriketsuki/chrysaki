# ===================================================================
# ~/.tmux.conf -- Chrysaki Geometric Configuration
# For: Beginner tmux user, WASD home position, mouse-heavy workflow
# Font: IosevkaTermSlab Nerd Font (Alacritty)
# ===================================================================

# ===================================================================
# SECTION 1: General / Quality-of-Life
# ===================================================================

# System clipboard via OSC 52 (Alacritty supports this natively --
# text you copy in tmux goes straight to your system clipboard)
set -g set-clipboard on

# Zero delay after pressing Escape (prevents accidental prefix triggers)
set -sg escape-time 0

# Generous scrollback buffer (default is only 2000 lines)
set -g history-limit 50000

# Start window and pane numbering at 1 instead of 0.
# This means Alt+1 = window 1, which matches the keyboard layout.
set -g base-index 1
setw -g pane-base-index 1

# When you close a window, automatically re-number the remaining ones
# so there are never gaps (e.g., closing window 2 renumbers 3 -> 2)
set -g renumber-windows on

# How long status messages stay on screen (ms)
set -g display-time 2000

# How long pane number indicators are shown when you press Prefix+q (ms)
set -g display-panes-time 2000

# How long you have to press a repeat-eligible key again (ms).
# Applies to resize commands -- hold the arrow key in quick succession.
set -g repeat-time 300

# Pass focus events through to applications inside tmux
# (lets editors like Neovim know when they gain/lose focus)
set -g focus-events on

# Monitor window activity: highlight windows with new output in the
# status bar, but don't pop up a disruptive message about it
setw -g monitor-activity on
set -g visual-activity off

# ===================================================================
# SECTION 2: Prefix Key
# ===================================================================

# Unbind the default prefix (Ctrl+b -- awkward reach, used in bash)
unbind C-b

# New prefix: Ctrl+Space
# Why: Left thumb (Space) + left pinky (Ctrl). Your fingers stay
# near WASD. Think of it like the "modifier" before every tmux action,
# similar to how Super is your Hyprland modifier.
set -g prefix C-Space
bind C-Space send-prefix

# ===================================================================
# SECTION 3: Pane Management
# ===================================================================
# Panes are the split panels inside a window -- like splitting your
# terminal into multiple sections.

# Split pane: vertical (side by side)
# Prefix + \   creates a right-side panel
# The \ character looks like a vertical divider
# Opens in the same directory you're currently in
bind \\ split-window -h -c "#{pane_current_path}"

# Split pane: horizontal (top and bottom)
# Prefix + -   creates a panel below
# The - character looks like a horizontal divider
bind - split-window -v -c "#{pane_current_path}"

# Navigate between panes with arrow keys
# Press Prefix, release, then tap an arrow key
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# Resize panes with Ctrl+Arrow (repeatable -- tap multiple times)
# The -r flag means you can tap the arrow again within repeat-time ms
# without pressing Prefix again
bind -r C-Up    resize-pane -U 2
bind -r C-Down  resize-pane -D 2
bind -r C-Left  resize-pane -L 2
bind -r C-Right resize-pane -R 2

# Close pane: asks for confirmation before killing
# Bound to w -- matches Firefox Ctrl+W and Arch Super+W muscle memory
bind w confirm-before -p "Close this pane? (y/n)" kill-pane

# Zoom pane: toggle fullscreen for the current pane
# Press again to restore the split layout
bind z resize-pane -Z

# ===================================================================
# SECTION 4: Window Management
# ===================================================================
# Windows are like VS Code's editor groups or Hyprland's workspaces --
# separate tabs within a tmux session, each with their own pane layout.

# New window (opens in the current directory)
# Both c (tmux default) and t (Firefox Ctrl+T muscle memory)
bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"

# Standard window switching: Prefix + 1-9
# (Already works by default with base-index 1)

# Fast window switching: Alt + 1-9 (no prefix needed)
# This mirrors your Hyprland Super+1-9 muscle memory.
# Note: If an app inside tmux also uses Alt+number, this takes
# priority at the tmux level. Most TUI apps don't use Alt+number.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Toggle between the last two windows (like Alt+Tab for windows)
bind Tab last-window

# Rename the current window
bind , command-prompt -I "#W" "rename-window '%%'"

# ===================================================================
# SECTION 5: Mouse Support
# ===================================================================
# Full mouse support: click to focus panes, drag to resize pane
# borders, scroll to view history, click to switch windows.
# This is on by default since you're a mouse-heavy user.
set -g mouse on

# ===================================================================
# SECTION 6: Copy Mode
# ===================================================================
# Copy mode lets you scroll back through terminal history and select
# text. Mouse scroll automatically enters copy mode.
# vi-style keys are used (j/k to scroll, / to search) -- even if
# you don't know vim, scrolling with the mouse works normally.
setw -g mode-keys vi

# ===================================================================
# SECTION 7: Utility Bindings
# ===================================================================

# Reload this config without restarting tmux
# Useful while you're tweaking settings
bind r source-file ~/.tmux.conf \; display-message " Config reloaded"

# Next / previous window (sequential)
bind n next-window
bind p previous-window

# ===================================================================
# SECTION 8: Command Palette (display-menu)
# ===================================================================
# Press Prefix then Space to open an interactive dropdown menu.
# Navigate with arrow keys or press the highlighted letter.
# Click an item with the mouse. Dismiss with Escape or q.
bind Space display-menu -T "#[fg=#1a8a6a,bold] ⬢  Commands " -x C -y S \
  "Split right          Prefix + \\"  "\\" "split-window -h -c '#{pane_current_path}'" \
  "Split below          Prefix + -"   "-"  "split-window -v -c '#{pane_current_path}'" \
  "Zoom / Unzoom        Prefix + z"   "z"  "resize-pane -Z" \
  "Close pane           Prefix + w"   "w"  "confirm-before kill-pane" \
  "" "" "" \
  "New window           Prefix + t/c" "t"  "new-window -c '#{pane_current_path}'" \
  "Next window          Prefix + n"   "n"  "next-window" \
  "Previous window      Prefix + p"   "p"  "previous-window" \
  "Last window          Prefix + Tab" "t"  "last-window" \
  "Rename window        Prefix + ,"   ","  "command-prompt -I '#W' 'rename-window \"%%\"'" \
  "" "" "" \
  "Session list         Prefix + s"   "s"  "choose-tree" \
  "Detach session       Prefix + d"   "d"  "detach-client" \
  "" "" "" \
  "Full help            Prefix + ?"   "?"  "display-popup -E -T ' ⬢  Help ' -h 90% -w 62 '~/.tmux/help.sh | less -R'"

# ===================================================================
# SECTION 9: Help popup (Prefix + ?)
# ===================================================================
# Shows a full keybinding reference card in a floating popup.
# Dismiss with q.
bind ? display-popup -E -T " ⬢  Chrysaki tmux Help " -h 90% -w 62 \
  "~/.tmux/help.sh | less -R"

# ===================================================================
# SECTION 10: Chrysaki Geometric Theme
# ===================================================================

source-file ~/.tmux/chrysaki.conf
