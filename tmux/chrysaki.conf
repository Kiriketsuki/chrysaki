# Chrysaki — tmux Theme
# Append to ~/.tmux.conf or save as ~/.tmux/chrysaki.conf
# and add: source-file ~/.tmux/chrysaki.conf

# -----------------------------------------------------------
# Terminal overrides for true color support
# -----------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# -----------------------------------------------------------
# Status bar
# -----------------------------------------------------------
set -g status-style "bg=#161821,fg=#a0a4b8"
                      # bg=Base, fg=Secondary Text

set -g status-position bottom
set -g status-justify left
set -g status-interval 5

# Status left: session name with Emerald Lt accent
set -g status-left-length 30
set -g status-left \
  "#[fg=#161821,bg=#1a8a6a,bold] #S "\
  "#[fg=#1a8a6a,bg=#161821] "
  # fg=Base, bg=Emerald Lt | transition

# Status right: date/time with Teal accent
set -g status-right-length 50
set -g status-right \
  "#[fg=#197278,bg=#161821] "\
  "#[fg=#161821,bg=#197278] %H:%M "\
  "#[fg=#e0e2ea,bg=#1c1f2b] %Y-%m-%d "
  # Teal transition | fg=Base bg=Teal | fg=Primary bg=Surface

# -----------------------------------------------------------
# Window status
# -----------------------------------------------------------
# Inactive windows
set -g window-status-style \
  "fg=#6a6e82,bg=#161821"
  # fg=Muted Text, bg=Base

set -g window-status-format " #I:#W "

# Active window
set -g window-status-current-style \
  "fg=#e0e2ea,bg=#1c1f2b,bold"
  # fg=Primary Text, bg=Surface

set -g window-status-current-format " #I:#W "

# Window activity
set -g window-status-activity-style \
  "fg=#FBB13C,bg=#161821"
  # fg=Blonde, bg=Base

# -----------------------------------------------------------
# Pane borders
# -----------------------------------------------------------
set -g pane-border-style "fg=#363a4f"
                          # fg=Border
set -g pane-active-border-style "fg=#1a8a6a"
                                 # fg=Emerald Lt

# -----------------------------------------------------------
# Messages and command prompt
# -----------------------------------------------------------
set -g message-style "fg=#e0e2ea,bg=#252836"
                      # fg=Primary Text, bg=Raised

set -g message-command-style "fg=#e0e2ea,bg=#252836"
                              # fg=Primary Text, bg=Raised

# -----------------------------------------------------------
# Copy mode / selection
# -----------------------------------------------------------
set -g mode-style "fg=#FBB13C,bg=#252836"
                   # fg=Blonde, bg=Raised

# -----------------------------------------------------------
# Clock mode
# -----------------------------------------------------------
set -g clock-mode-colour "#197278"
                          # Teal

# -----------------------------------------------------------
# Display panes indicator
# -----------------------------------------------------------
set -g display-panes-active-colour "#1a8a6a"
                                    # Emerald Lt
set -g display-panes-colour "#363a4f"
                             # Border
