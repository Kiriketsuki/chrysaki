# ===================================================================
# Chrysaki Geometric Theme for tmux
# Design: Glass morphism depth, angular separators, jewel accents
# Font: IosevkaTermSlab Nerd Font required
# ===================================================================
#
# Surface depth layers (dark to light = far to near):
#   Abyss    #0f1117  -- status bar background (shadow layer)
#   Surface  #1c1f2b  -- right-side info shelf
#   Raised   #252836  -- active window, time block (foreground)
#
# Separator glyphs (standard Nerd Font powerline -- reliable):
#    U+E0B0  -- right-pointing solid fill
#    U+E0B2  -- left-pointing solid fill
#
# PREFIX FEEDBACK:
#   When Ctrl+Space is pressed, the session badge turns Blonde and
#   shows "prefix..." confirming tmux is waiting for your command.
# ===================================================================

# --- True-color terminal overrides ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc,*256col*:Tc"

# --- Status bar: position, timing, and base style ---
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#0f1117,fg=#a0a4b8"

# -------------------------------------------------------------------
# STATUS LEFT: Session badge with prefix feedback
# Normal:        [Emerald  session]  Prefix active: [Blonde  prefix...]
# #{?client_prefix,...,...} swaps badge color -- commas escaped as #,
# -------------------------------------------------------------------
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[fg=#0f1117#,bg=#FBB13C#,bold] ⬢ prefix... #[fg=#FBB13C#,bg=#0f1117#,nobold],#[fg=#e0e2ea#,bg=#1a8a6a#,bold] ⬢ #S #[fg=#1a8a6a#,bg=#0f1117#,nobold]}#[fg=#363a4f,bg=#0f1117] "

# -------------------------------------------------------------------
# WINDOW LIST: Inactive windows
# -------------------------------------------------------------------
setw -g window-status-style "fg=#6a6e82,bg=#0f1117"
setw -g window-status-format " ◇ #I:#W "
setw -g window-status-separator ""

# -------------------------------------------------------------------
# WINDOW LIST: Active window
# [ ⬢ window-name ]  -- solid right/left triangles, full cell height
# Raised (#252836) on Abyss (#0f1117) = lifted glass tab depth effect
# -------------------------------------------------------------------
setw -g window-status-current-style "fg=#e0e2ea,bg=#252836,bold"
setw -g window-status-current-format "#[fg=#252836,bg=#0f1117,nobold]#[fg=#e0e2ea,bg=#252836,bold] ⬢ #I:#W #[fg=#252836,bg=#0f1117,nobold]"

# --- Activity alert ---
setw -g window-status-activity-style "fg=#FBB13C,bg=#0f1117"

# -------------------------------------------------------------------
# STATUS RIGHT: Git branch + hostname + time + date
# [Surface: branch ◆ host ][Raised: HH:MM  MM-DD ]
# -------------------------------------------------------------------
set -g status-right-length 80
set -g status-right "#[fg=#1c1f2b,bg=#0f1117,nobold]#[fg=#20969c,bg=#1c1f2b] #(~/.tmux/scripts/git-branch.sh '#{pane_current_path}') #[fg=#363a4f,bg=#1c1f2b]◆#[fg=#a0a4b8,bg=#1c1f2b] #H #[fg=#252836,bg=#1c1f2b,nobold]#[fg=#e0e2ea,bg=#252836,bold] %H:%M #[fg=#a0a4b8,bg=#252836,nobold] %m-%d "

# -------------------------------------------------------------------
# PANE BORDERS
# -------------------------------------------------------------------
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#1a8a6a"

# -------------------------------------------------------------------
# MESSAGES AND COMMAND PROMPT
# -------------------------------------------------------------------
set -g message-style "fg=#e0e2ea,bg=#252836"
set -g message-command-style "fg=#e0e2ea,bg=#252836"

# --- Copy mode / selection highlight ---
set -g mode-style "fg=#FBB13C,bg=#252836"

# --- Clock mode ---
set -g clock-mode-colour "#197278"

# --- Display pane number indicators ---
set -g display-panes-active-colour "#1a8a6a"
set -g display-panes-colour "#363a4f"
