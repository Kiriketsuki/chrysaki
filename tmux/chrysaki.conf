# ===================================================================
# Chrysaki Geometric Theme for tmux
# Design: Glass morphism depth, angular separators, jewel accents
# Font: IosevkaTermSlab Nerd Font required
# Tiling spec: ../TILING.md | Generator: ../tools/tiling.py
# ===================================================================
#
# Surface depth layers (dark to light = far to near):
#   Abyss    #0f1117  -- status bar background (shadow layer)
#   Surface  #1c1f2b  -- inactive windows
#   Raised   #252836  -- active window, time block (foreground)
#
# Left-side zigzag separators (Nerd Font powerline diagonals):
#    U+E0BC  -- \ diagonal (back edge, element right or entering next)
#    U+E0B8  -- / diagonal (forward edge, element right or entering next)
#    U+E0B0  -- straight | (terminal edge, last element only)
# Right-side separators (standard Nerd Font powerline -- reliable):
#    U+E0B0  -- right-pointing solid fill
#    U+E0B2  -- left-pointing solid fill
#
# ZIGZAG-ALT PRESET (|,\) â€” tiling spec element sequence, base-index=1:
#   Element 0 (session):  (|,\)  -- left=|, right=\ (badge right edge)
#   Element 1 (window 1): (\,/)  -- even: left=\, right=/
#   Element 2 (window 2): (/,\)  -- odd:  left=/, right=\
#   Element 3 (window 3): (\,/)  -- even: left=\, right=/
#   Element N (last win): (*,|)  -- last always terminates with |
#
# EVEN/ODD: (window_index - 1) % 2 to normalise for base-index=1
# IS_LAST:  window_index == session_windows  (true when base-index=1)
#
# PREFIX FEEDBACK:
#   When Ctrl+Space is pressed, the session badge turns Blonde and
#   shows "prefix..." confirming tmux is waiting for your command.
# ===================================================================

# --- True-color terminal overrides ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc,*256col*:Tc"


# --- Animated badge: daemon writes @badge-bg every 100ms; status-left reads
# #{@badge-bg} inline Ă˘Â€Â” no #() subprocess, no stale-cache blink. ---
set -g @badge-bg "#1a8a6a"
# run-shell "~/.config/tmux/scripts/session-badge-daemon.sh &"

# --- Window renumbering ---
set -g renumber-windows on

# --- Status bar: position, timing, and base style ---
set -g status-position bottom
set -g status-justify left
set -g status-interval 1
set -g status-style "bg=#0f1117,fg=#a0a4b8"

# -------------------------------------------------------------------
# STATUS LEFT: Session badge (zigzag-alt element 0) + prefix feedback
# + vim-style mode indicator.
# Normal:   â¬˘[Emerald session]  NORMAL
# Prefix:   â¬˘[Blonde  prefix...]  NORMAL
# Copy:     â¬˘[Emerald session]  [Blonde COPY]
# Clock:    â¬˘[Emerald session]  [Teal CLOCK]
# Commas inside #[...] within #{?...} blocks must be escaped as #,
# -------------------------------------------------------------------
set -g status-left-length 60
set -g status-left "#{?client_prefix,#[fg=#0f1117#,bg=#FBB13C#,bold] â¬˘ prefix... #[fg=#FBB13C#,bg=#0f1117#,nobold]î‚¸,#[fg=#e0e2ea#,bg=#{@badge-bg}#,bold] â¬˘ #S #[fg=#{@badge-bg}#,bg=#0f1117#,nobold]î‚¸}#[fg=#363a4f,bg=#0f1117] #{?#{pane_in_mode},#{?#{==:#{pane_mode},copy-mode},#[fg=#0f1117#,bg=#FBB13C#,bold] COPY #[fg=#FBB13C#,bg=#0f1117#,nobold],#{?#{==:#{pane_mode},clock-mode},#[fg=#e0e2ea#,bg=#197278#,bold] CLOCK #[fg=#197278#,bg=#0f1117#,nobold],#[fg=#e0e2ea#,bg=#197278#,bold] #{pane_mode} #[fg=#197278#,bg=#0f1117#,nobold]}},#[fg=#6a6e82#,bg=#0f1117] NORMAL }"

# -------------------------------------------------------------------
# WINDOW LIST: Inactive windows -- zigzag-alt tessellation (TILING.md Â§4)
#
# Edge algebra for zigzag-alt preset (|,\):
#   Element i (even, not last): (\,/)  -- back left, forward right
#   Element i (even, last):     (\,|)  -- back left, terminal right
#   Element i (odd,  not last): (/,\)  -- forward left, back right
#   Element i (odd,  last):     (/,|)  -- forward left, terminal right
#
# Glyph map:  \=E0BC  /=E0B8  |=E0B0
# Color: Surface (#1c1f2b) on Abyss (#0f1117), Muted fg (#6a6e82)
# is_even: {==:{e|%|:{e|-|:{window_index},1},2},0}
# is_last: {==:{window_index},{session_windows}}
# -------------------------------------------------------------------
setw -g window-status-style "fg=#6a6e82,bg=#0f1117"
setw -g window-status-separator ""
setw -g window-status-format "#{?#{==:#{e|%|:#{e|-|:#{window_index},1},2},0},#{?#{==:#{window_index},#{session_windows}},#[fg=#0f1117#,bg=#1c1f2b]î‚Ľ#[fg=#6a6e82#,bg=#1c1f2b] #I:#W #[fg=#1c1f2b#,bg=#0f1117]î‚°,#[fg=#0f1117#,bg=#1c1f2b]î‚Ľ#[fg=#6a6e82#,bg=#1c1f2b] #I:#W #[fg=#1c1f2b#,bg=#0f1117]î‚¸},#{?#{==:#{window_index},#{session_windows}},#[fg=#0f1117#,bg=#1c1f2b]î‚¸#[fg=#6a6e82#,bg=#1c1f2b] #I:#W #[fg=#1c1f2b#,bg=#0f1117]î‚°,#[fg=#0f1117#,bg=#1c1f2b]î‚¸#[fg=#6a6e82#,bg=#1c1f2b] #I:#W #[fg=#1c1f2b#,bg=#0f1117]î‚Ľ}}"

# -------------------------------------------------------------------
# WINDOW LIST: Active window -- same zigzag-alt edges, Raised bg + bold
# Badge: â¬˘ hexagon (U+2B22), unchanged across all active variants
# Color: Raised (#252836) on Abyss (#0f1117), Primary fg (#e0e2ea)
# See TILING.md Â§4 for full edge propagation algorithm
# -------------------------------------------------------------------
setw -g window-status-current-style "fg=#e0e2ea,bg=#252836,bold"
setw -g window-status-current-format "#{?#{==:#{e|%|:#{e|-|:#{window_index},1},2},0},#{?#{==:#{window_index},#{session_windows}},#[fg=#0f1117#,bg=#252836]î‚Ľ#[fg=#e0e2ea#,bg=#252836#,bold] â¬˘ #I:#W #[fg=#252836#,bg=#0f1117#,nobold]î‚°,#[fg=#0f1117#,bg=#252836]î‚Ľ#[fg=#e0e2ea#,bg=#252836#,bold] â¬˘ #I:#W #[fg=#252836#,bg=#0f1117#,nobold]î‚¸},#{?#{==:#{window_index},#{session_windows}},#[fg=#0f1117#,bg=#252836]î‚¸#[fg=#e0e2ea#,bg=#252836#,bold] â¬˘ #I:#W #[fg=#252836#,bg=#0f1117#,nobold]î‚°,#[fg=#0f1117#,bg=#252836]î‚¸#[fg=#e0e2ea#,bg=#252836#,bold] â¬˘ #I:#W #[fg=#252836#,bg=#0f1117#,nobold]î‚Ľ}}"

# --- Activity alert ---
setw -g window-status-activity-style "fg=#FBB13C,bg=#0f1117"

# -------------------------------------------------------------------
# STATUS RIGHT: Git branch + hostname + time + date
# [Surface: branch â—† host ][Raised: HH:MM  MM-DD ]
# -------------------------------------------------------------------
set -g status-right-length 80
set -g status-right "#[fg=#1c1f2b,bg=#0f1117,nobold]î‚˛#[fg=#20969c,bg=#1c1f2b] #(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}') #[fg=#363a4f,bg=#1c1f2b]â—†#[fg=#a0a4b8,bg=#1c1f2b] #H #[fg=#252836,bg=#1c1f2b,nobold]î‚˛#[fg=#e0e2ea,bg=#252836,bold] %H:%M #[fg=#a0a4b8,bg=#252836,nobold] %m-%d "

# -------------------------------------------------------------------
# PANE BORDERS
# -------------------------------------------------------------------
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#1a8a6a"

# --- Copy mode indicator: Blonde border when in copy mode, Emerald when idle ---
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "set pane-active-border-style fg=#FBB13C" "set pane-active-border-style fg=#1a8a6a"'
set-hook -ag pane-mode-changed 'refresh-client -S'  # immediately update mode badge

# -------------------------------------------------------------------
# MESSAGES AND COMMAND PROMPT
# -------------------------------------------------------------------
set -g message-style "fg=#e0e2ea,bg=#252836"
set -g message-command-style "fg=#e0e2ea,bg=#252836"

# --- Copy mode / selection highlight ---
set -g mode-style "fg=#FBB13C,bg=#363a4f"
# Selection highlight: explicit override of copy-mode-selection-style default
# so #{E:mode-style} evaluation is bypassed (potential 3.6a issue)
setw -g copy-mode-selection-style "fg=#e0e2ea,bg=#1c3d7a"

# --- Clock mode ---
set -g clock-mode-colour "#197278"

# --- Display pane number indicators ---
set -g display-panes-active-colour "#1a8a6a"
set -g display-panes-colour "#363a4f"
