# ===================================================================
# Chrysaki Lite -- Termius-safe status bar (ASCII-only, no Nerd Font)
#
# Root cause: tmux counts EAW=Ambiguous Unicode chars (powerline glyphs,
# MDI icons, degree sign, diamond) as 1 cell wide. Termius on Android
# renders them as 2 cells wide. The width mismatch causes the status bar
# to overflow past the terminal right edge on every status-interval
# redraw, making the entire screen scroll up ('Tetris' bug).
#
# This file eliminates all EAW=Ambiguous characters from the status bar:
#   - Nerd Font powerline glyphs (U+E0B0/B2/B8/BC) -> plain text
#   - Diamond separator (U+25C6)                    -> ASCII |
#   - MDI thermometer/fan icons (U+F050F, U+F0210)  -> T: / F:
#   - Degree sign in temperatures (U+00B0)          -> omitted
#   - Branch icon (U+E0A0) in git-branch.sh         -> omitted
# It also drops pane-border-status to save a row and slows status-interval
# to 5s (from 1s) to reduce redraw frequency over mobile SSH.
#
# Activate:   Prefix + M  (or: tmux source ~/.config/tmux/chrysaki-lite.conf)
# Deactivate: Prefix + M  (re-sources full chrysaki.conf to restore glyphs)
# ===================================================================

set -g @termius-mode on

# Slower refresh -- fewer redraws over a mobile SSH connection
set -g status-interval 5

# --- Status bar base ---
set -g status-position bottom
set -g status-style "bg=#0f1117,fg=#a0a4b8"

# -------------------------------------------------------------------
# STATUS LEFT: [PFX][session][mode] -- all ASCII, no powerline glyphs
#
# Normal:   [session-name]
# Prefix:   [PFX] [session-name]
# Copy:     [session-name] [COPY]
# Other:    [session-name] [mode-name]
#
# Commas inside #[...] blocks must be escaped as #, when nested
# inside a #{?...} conditional.
# -------------------------------------------------------------------
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[fg=#FBB13C#,bold] [PFX] #[default],}#[fg=#1a8a6a,bold] [#S] #[default]#{?#{pane_in_mode},#{?#{==:#{pane_mode},copy-mode},#[fg=#FBB13C#,bold] [COPY] #[default],#[fg=#20969c#,bold] [#{pane_mode}] #[default]},}"

# -------------------------------------------------------------------
# WINDOW LIST: plain text brackets, no powerline or zigzag glyphs
# -------------------------------------------------------------------
setw -g window-status-style "fg=#6a6e82,bg=#0f1117"
setw -g window-status-separator " "
setw -g window-status-format " #I:#W#{?window_activity_flag,!,} "
setw -g window-status-current-style "fg=#e0e2ea,bg=#252836,bold"
setw -g window-status-current-format " [#I:#W] "

# --- Activity alert (unchanged from full theme) ---
setw -g window-status-activity-style "fg=#FBB13C,bg=#0f1117"

# -------------------------------------------------------------------
# STATUS RIGHT: git branch | host | thermal (ASCII) | time
#
# thermal.py --bar-ascii emits 'T:58C  F:2500rpm' with tmux color
# format strings but no EAW=Ambiguous characters.
# -------------------------------------------------------------------
set -g status-right-length 80
set -g status-right "#[fg=#20969c] #(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}') #[fg=#363a4f] | #[fg=#a0a4b8] #H #[fg=#363a4f] |#(~/.config/tmux/scripts/thermal.py --bar-ascii) #[fg=#363a4f] | #[fg=#e0e2ea,bold] %H:%M #[fg=#a0a4b8,nobold] %m-%d "

# -------------------------------------------------------------------
# PANE BORDERS: disable per-pane labels to save a row on mobile
# (restored by sourcing chrysaki.conf when switching back to full mode)
# -------------------------------------------------------------------
set -g pane-border-status off
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#1a8a6a"

# --- Messages ---
set -g message-style "fg=#e0e2ea,bg=#252836"
set -g message-command-style "fg=#e0e2ea,bg=#252836"
