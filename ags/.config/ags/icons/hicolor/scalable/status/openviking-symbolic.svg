  <!-- Eye slit -->
  <line x1="4.5" y1="9" x2="7" y2="9" stroke="#e0e2ea" stroke-width="1.2"/>
  <line x1="9" y1="9" x2="11.5" y2="9" stroke="#e0e2ea" stroke-width="1.2"/>
  <!-- Rim -->
  <line x1="3" y1="10.5" x2="13" y2="10.5" stroke="#e0e2ea" stroke-width="1.5"/>
  <!-- Chain mail hint -->
