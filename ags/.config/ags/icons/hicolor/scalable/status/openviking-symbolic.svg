<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Viking helmet with horns -->
  <!-- Horns -->
  <path d="M3.5 7.5 Q1 4 2.5 1.5" fill="none" stroke="#e0e2ea" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M12.5 7.5 Q15 4 13.5 1.5" fill="none" stroke="#e0e2ea" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Helmet dome -->
  <path d="M3.5 10 Q3.5 5 8 5 Q12.5 5 12.5 10" fill="none" stroke="#e0e2ea" stroke-width="1.2"/>
  <!-- Nose guard -->
