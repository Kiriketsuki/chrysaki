<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window outline -->
  <rect x="1" y="2" width="14" height="12" fill="none" stroke="#e0e2ea" stroke-width="1.2"/>
  <!-- Title bar separator -->
  <line x1="1" y1="5.5" x2="15" y2="5.5" stroke="#e0e2ea" stroke-width="0.8"/>
  <!-- Prompt chevron > -->
  <path d="M3.5 8 L6 10 L3.5 12"
        fill="none" stroke="#e0e2ea" stroke-width="1.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor underscore -->
  <line x1="7.5" y1="12" x2="10.5" y2="12" stroke="#e0e2ea" stroke-width="1.3" stroke-linecap="round"/>
</svg>
